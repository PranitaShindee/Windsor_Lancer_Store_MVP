{% extends "events/base.html" %}
{% block title %}CampusConnect | Password Changed{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm p-4 text-center">
            <div class="card-body">
                <h2 class="card-title mb-3 fw-bold text-success">Password Reset Complete</h2>
                <p class="text-muted mb-4">Your password has been successfully reset. You may now log in with your new credentials.</p>
                <div class="d-grid gap-2 mt-4">
                    <a href="{% url 'events:login' %}" class="btn btn-primary btn-lg">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
